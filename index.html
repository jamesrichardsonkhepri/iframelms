<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Menu Demo</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --muted:#6a6a6a;

      --hero-radius:32px;
      --menu-radius:28px;

      --hero-border:rgba(238,238,238,1);
      --hero-shadow:0 16px 42px rgba(0,0,0,0.045);

      --glass-1:rgba(245,245,245,0.82);
      --glass-2:rgba(235,235,235,0.58);
      --glass-border:rgba(255,255,255,0.78);
      --menu-shadow:
        0 16px 34px rgba(0,0,0,0.08),
        0 6px 14px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.94);

      --panel-bg:rgba(255,255,255,0.50);
      --panel-border:rgba(255,255,255,0.72);
      --panel-shadow:
        0 12px 28px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.9);

      --feature-bg:rgba(242,242,242,0.72);
      --feature-border:rgba(255,255,255,0.84);

      --pill:#f6e0cf;
      --pill-strong:#f1d2bb;

      --button-bg:#111111;
      --button-text:#ffffff;
      --button-hover:#262626;

      --ease:cubic-bezier(.22,.7,.1,1);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin:0;
      padding:0;
      background:#ffffff;
      color:var(--text);
      font-family:Lato, Arial, sans-serif;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
    }

    .shell{
      width:100%;
      padding:22px;
      display:flex;
      justify-content:center;
      background:#ffffff;
    }

    .frame{
      width:min(1320px, 100%);
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    /* HERO */
    .hero{
      position:relative;
      min-height:560px;
      border-radius:var(--hero-radius);
      overflow:hidden;
      border:1px solid var(--hero-border);
      background:#ffffff;
      box-shadow:var(--hero-shadow);
      isolation:isolate;
    }

    .hero-surface{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity 280ms ease;
      background-size:160% 160%;
      animation:powderFlow 16s ease-in-out infinite;
      pointer-events:none;
    }

    .hero-surface.active{
      opacity:1;
    }

    .hero-home{
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,0.78) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 84% 22%, rgba(247,247,247,0.58) 0%, rgba(247,247,247,0) 28%),
        linear-gradient(135deg, #ffffff 0%, #f8f8f8 50%, #fdfdfd 100%);
      animation:none;
      opacity:1;
    }

    .hero-learning{
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.48) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 84% 20%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 26%),
        linear-gradient(135deg, #fbfbfb 0%, #efefef 28%, #e6dfda 50%, #f3efec 72%, #fcfcfc 100%);
    }

    .hero-resources{
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.48) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 84% 20%, rgba(228,236,242,0.22) 0%, rgba(228,236,242,0) 28%),
        linear-gradient(135deg, #fbfcfd 0%, #eef3f6 30%, #d9e4eb 52%, #eef3f7 74%, #fdfeff 100%);
    }

    .hero-compliance{
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.46) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 84% 20%, rgba(235,228,247,0.22) 0%, rgba(235,228,247,0) 28%),
        linear-gradient(135deg, #fdfcff 0%, #f1edf8 30%, #e2d8f0 52%, #f1ebf9 74%, #fefcff 100%);
    }

    .hero-settings{
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.46) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 84% 20%, rgba(236,236,236,0.20) 0%, rgba(236,236,236,0) 28%),
        linear-gradient(135deg, #fbfbfb 0%, #efefef 30%, #e1e1e1 52%, #f2f2f2 74%, #ffffff 100%);
    }

    .hero-gloss{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(
          120deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.05) 18%,
          rgba(255,255,255,0.14) 30%,
          rgba(255,255,255,0.04) 44%,
          rgba(255,255,255,0) 60%
        );
      background-size:220% 220%;
      animation:surfaceSweep 8s linear infinite;
      opacity:.9;
      mix-blend-mode:screen;
      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:2;
      min-height:560px;
      padding:32px;
      display:flex;
    }

    .state-panel{
      width:100%;
      display:grid;
      grid-template-columns:minmax(0, 1.45fr) minmax(310px, 0.92fr);
      gap:24px;
      align-items:stretch;
    }

    .state-main,
    .state-feature{
      border-radius:28px;
      border:1px solid var(--panel-border);
      box-shadow:var(--panel-shadow);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .state-main{
      background:var(--panel-bg);
      padding:34px 36px 30px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .state-feature{
      background:var(--feature-bg);
      border:1px solid var(--feature-border);
      padding:28px 24px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .eyebrow{
      margin:0 0 14px 0;
      font-size:12px;
      line-height:1.2;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#676767;
    }

    .state-title{
      margin:0;
      font-size:clamp(40px, 5vw, 72px);
      line-height:.94;
      letter-spacing:-.06em;
      font-weight:800;
      text-align:left;
      max-width:10.5ch;
    }

    .state-description{
      margin:18px 0 0 0;
      max-width:64ch;
      font-size:16px;
      line-height:1.62;
      color:#4c4c4c;
    }

    .bullet-list{
      list-style:none;
      padding:0;
      margin:24px 0 0 0;
      display:grid;
      gap:12px;
    }

    .bullet-list li{
      display:flex;
      align-items:flex-start;
      gap:12px;
      color:#333333;
      font-size:15px;
      line-height:1.55;
    }

    .bullet-list i{
      margin-top:4px;
      font-size:13px;
      color:#111111;
      flex:0 0 auto;
    }

    .cta-row{
      margin-top:30px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .primary-cta,
    .secondary-cta{
      appearance:none;
      border:0;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border-radius:999px;
      font-family:inherit;
      font-weight:700;
      transition:
        transform 160ms ease,
        background 160ms ease,
        box-shadow 160ms ease,
        color 160ms ease;
      cursor:pointer;
    }

    .primary-cta{
      min-height:50px;
      padding:14px 20px;
      background:var(--button-bg);
      color:var(--button-text);
      box-shadow:0 10px 20px rgba(0,0,0,0.10);
    }

    .primary-cta:hover{
      background:var(--button-hover);
      transform:translateY(-1px);
    }

    .secondary-cta{
      min-height:46px;
      padding:12px 18px;
      background:rgba(255,255,255,0.82);
      color:#111111;
      border:1px solid rgba(255,255,255,0.88);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .secondary-cta:hover{
      background:rgba(255,255,255,0.94);
      transform:translateY(-1px);
    }

    .feature-label{
      margin:0 0 14px 0;
      font-size:12px;
      line-height:1.2;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#676767;
    }

    .feature-title{
      margin:0;
      font-size:clamp(22px, 2.2vw, 32px);
      line-height:1.06;
      letter-spacing:-.04em;
      font-weight:800;
    }

    .feature-body{
      margin:16px 0 0 0;
      font-size:15px;
      line-height:1.62;
      color:#4b4b4b;
    }

    .feature-footer{
      margin-top:22px;
      padding-top:18px;
      border-top:1px solid rgba(0,0,0,0.06);
    }

    .feature-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.76);
      border:1px solid rgba(255,255,255,0.90);
      font-size:12px;
      font-weight:700;
      color:#333333;
    }

    /* MENU */
    .menu-zone{
      width:100%;
      margin-top:-6px;
    }

    .menu-wrap{
      position:relative;
      width:100%;
      border-radius:var(--menu-radius);
      overflow:hidden;
      border:1px solid var(--glass-border);
      background:
        linear-gradient(135deg, var(--glass-1) 0%, var(--glass-2) 50%, rgba(245,245,245,0.74) 100%);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--menu-shadow);
      isolation:isolate;
    }

    .menu-wrap::before{
      content:"";
      position:absolute;
      inset:-35% -15%;
      background:
        linear-gradient(
          115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.08) 18%,
          rgba(255,255,255,0.20) 28%,
          rgba(255,255,255,0.04) 40%,
          rgba(255,255,255,0) 54%
        );
      transform:translateX(-56%);
      animation:glassSweep 10s ease-in-out infinite;
      pointer-events:none;
      z-index:0;
    }

    .menu{
      position:relative;
      z-index:2;
      width:100%;
      display:grid;
      grid-template-columns:62px 1fr 62px;
      gap:12px;
      align-items:center;
      padding:14px;
    }

    .icon-btn{
      width:52px;
      height:52px;
      border-radius:999px;
      appearance:none;
      border:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:18px;
      color:#111111;
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        background 160ms ease;
      flex:0 0 auto;
    }

    .icon-btn:hover{
      transform:translateY(-1px);
    }

    .home-btn{
      background:rgba(255,255,255,0.96);
      border:1px solid rgba(255,255,255,0.96);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,1);
    }

    .settings-btn{
      background:rgba(255,255,255,0.60);
      border:1px solid rgba(255,255,255,0.76);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.92);
    }

    .menu-items{
      min-width:0;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .menu-item{
      position:relative;
      appearance:none;
      border:0;
      background:transparent;
      color:#171717;
      border-radius:999px;
      padding:14px 22px;
      font-family:inherit;
      font-size:clamp(15px, 1.35vw, 20px);
      line-height:1;
      letter-spacing:-.02em;
      font-weight:700;
      white-space:nowrap;
      cursor:pointer;
      overflow:hidden;
      isolation:isolate;
      transition:
        background 160ms ease,
        box-shadow 160ms ease,
        transform 160ms ease,
        color 160ms ease;
    }

    .menu-item span{
      position:relative;
      z-index:2;
    }

    .menu-item::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      opacity:0;
      pointer-events:none;
      background:
        linear-gradient(
          115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.10) 26%,
          rgba(255,255,255,0.22) 42%,
          rgba(255,255,255,0.05) 58%,
          rgba(255,255,255,0) 72%
        );
      background-size:200% 200%;
      transition:opacity 160ms ease;
    }

    .menu-item:hover,
    .menu-item:focus-visible,
    .menu-item.active{
      background:var(--pill);
      color:#111111;
      box-shadow:
        0 7px 16px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.65);
      transform:translateY(-1px);
      outline:none;
    }

    .menu-item:hover::before,
    .menu-item:focus-visible::before,
    .menu-item.active::before{
      opacity:1;
      animation:subtlePillMove 3.2s linear infinite;
    }

    .menu-item.active{
      background:var(--pill-strong);
    }

    /* Small laptop */
    @media (max-width: 1200px){
      .shell{
        padding:18px;
      }

      .hero{
        min-height:520px;
      }

      .hero-content{
        min-height:520px;
        padding:26px;
      }

      .state-panel{
        grid-template-columns:minmax(0, 1.2fr) minmax(290px, 0.9fr);
        gap:18px;
      }

      .state-main{
        padding:28px 28px 24px;
      }

      .state-feature{
        padding:24px 20px;
      }

      .menu-item{
        padding:13px 18px;
      }
    }

    /* Tablet landscape / cramped laptop */
    @media (max-width: 980px){
      .frame{
        gap:18px;
      }

      .hero{
        min-height:620px;
      }

      .hero-content{
        min-height:620px;
        padding:22px;
      }

      .state-panel{
        grid-template-columns:1fr;
        gap:16px;
      }

      .state-title{
        max-width:none;
      }

      .menu{
        grid-template-columns:54px 1fr 54px;
        align-items:start;
      }

      .icon-btn{
        width:48px;
        height:48px;
        font-size:17px;
      }

      .menu-items{
        gap:8px;
        justify-content:center;
      }
    }

    /* Tablet portrait */
    @media (max-width: 820px){
      .shell{
        padding:14px;
      }

      .hero{
        min-height:660px;
        border-radius:28px;
      }

      .hero-content{
        min-height:660px;
        padding:18px;
      }

      .state-main{
        padding:24px 22px 20px;
      }

      .state-feature{
        padding:22px 18px;
      }

      .state-title{
        font-size:clamp(34px, 7vw, 56px);
      }

      .state-description{
        font-size:15px;
      }
    }

    /* Mobile */
    @media (max-width: 700px){
      .shell{
        padding:12px;
      }

      .frame{
        gap:14px;
      }

      .hero{
        min-height:auto;
      }

      .hero-content{
        min-height:auto;
        padding:14px;
      }

      .state-main,
      .state-feature{
        border-radius:22px;
      }

      .state-main{
        padding:20px 18px 18px;
      }

      .state-feature{
        padding:18px 16px;
      }

      .state-title{
        font-size:clamp(30px, 9vw, 44px);
        line-height:.98;
      }

      .state-description{
        margin-top:14px;
        font-size:14px;
        line-height:1.55;
      }

      .bullet-list{
        margin-top:18px;
        gap:10px;
      }

      .bullet-list li{
        font-size:14px;
      }

      .cta-row{
        margin-top:22px;
        flex-direction:column;
        align-items:stretch;
      }

      .primary-cta,
      .secondary-cta{
        width:100%;
      }

      .menu-wrap{
        border-radius:24px;
      }

      .menu{
        grid-template-columns:48px 1fr 48px;
        gap:8px;
        padding:10px;
      }

      .icon-btn{
        width:44px;
        height:44px;
        font-size:16px;
      }

      .menu-items{
        gap:6px;
      }

      .menu-item{
        padding:12px 14px;
        font-size:14px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *{
        animation:none !important;
        transition:none !important;
        scroll-behavior:auto !important;
      }
    }

    @keyframes powderFlow{
      0%{background-position:0% 50%}
      25%{background-position:28% 35%}
      50%{background-position:100% 50%}
      75%{background-position:72% 70%}
      100%{background-position:0% 50%}
    }

    @keyframes surfaceSweep{
      0%{background-position:0% 50%}
      100%{background-position:220% 50%}
    }

    @keyframes glassSweep{
      0%{transform:translateX(-56%)}
      50%{transform:translateX(18%)}
      100%{transform:translateX(-56%)}
    }

    @keyframes subtlePillMove{
      0%{background-position:0% 50%}
      100%{background-position:200% 50%}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="frame">

      <section class="hero" id="hero" data-state="home" aria-live="polite">
        <div class="hero-surface hero-home active" data-surface="home"></div>
        <div class="hero-surface hero-learning" data-surface="learning"></div>
        <div class="hero-surface hero-resources" data-surface="resources"></div>
        <div class="hero-surface hero-compliance" data-surface="compliance"></div>
        <div class="hero-surface hero-settings" data-surface="settings"></div>
        <div class="hero-gloss"></div>

        <div class="hero-content">
          <div id="heroPanel" class="state-panel"></div>
        </div>
      </section>

      <div class="menu-zone">
        <nav class="menu-wrap" aria-label="Main menu">

            <button class="icon-btn home-btn" id="homeBtn" type="button" aria-label="Home">
              <i class="fa-solid fa-house"></i>
            </button>

            <div class="menu-items" id="menuItems">
              <button class="menu-item" type="button" data-key="learning"><span>Learning</span></button>
              <button class="menu-item" type="button" data-key="resources"><span>Resources</span></button>
              <button class="menu-item" type="button" data-key="compliance"><span>Compliance</span></button>

            <button class="icon-btn settings-btn" id="settingsBtn" type="button" aria-label="Settings">
              <i class="fa-solid fa-gear"></i>
            </button>
          </div>
        </nav>
      </div>

    </div>
  </div>

        description: "Manage profile and account-level preferences from a dedicated tile that gives users a clear route into personal settings.",
        bullets: [
          "Review account and profile details.",
          "Update user-level settings and platform preferences.",
          "Keep personal configuration neat and current."
        ],
        ctaLabel: "Go to Settings",
        ctaUrl: links.settings,
        featureLabel: "Featured item",
        featureTitle: "Profile controls",
        featureBody: "Use the profile area to update personal details and review the settings currently available to your account.",
        featureLinkLabel: "Open profile",
        featureLinkUrl: links.settings
      }
    };

    let activeKey = 'home';

    function openInNewTab(url){
      if (!url) return;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function renderBullets(items){
      return items.map(item => `
        <li>
          <i class="fa-solid fa-check"></i>
          <span>${item}</span>
        </li>
      `).join('');
    }

    function renderState(key){
      const state = states[key];

      heroPanel.innerHTML = `
        <div class="state-main">
          <div>
            <p class="eyebrow">${state.eyebrow}</p>
            <h1 class="state-title">${state.title}</h1>
            <p class="state-description">${state.description}</p>

            <ul class="bullet-list">
              ${renderBullets(state.bullets)}
            </ul>
          </div>

          <div class="cta-row">
            <a class="primary-cta" href="${state.ctaUrl || '#'}" data-open-link="${state.ctaUrl || ''a-solid fa-arrow-right"></i>
            </a>
          </div>
        </div>

        <aside class="state-feature">
          <div>
            <p class="feature-label">${state.featureLabel}</p>
            <h2 class="feature-title">${state.featureTitle}</h2>
            <p class="feature-body">${state.featureBody}</p>
          </div>

          <div class="feature-footer">
            <div class="feature-chip">
              <i class="fa-solid fa-sparkles"></i>
              <span>Featured shortcut</span>
            </div>

            <div class="cta-row">
              <a class="secondary-cta" href="${state.featureLinkUrl || '#'}" data-open-link="${state.featureLinkUrl || ''"fa-solid fa-arrow-up-right-from-square"></i>
              </a>
            </div>
          </div>
        </aside>
      `;

      heroPanel.querySelectorAll('[data-open-link]').forEach(linkEl => {
        linkEl.addEventListener('click', (event) => {
          event.preventDefault();
          const url = linkEl.getAttribute('data-open-link');
          openInNewTab(url);
        });
      });
    }

    function setSurface(key){
      surfaces.forEach(surface => {
        const isMatch = surface.dataset.surface === key;
        surface.classList.toggle('active', isMatch);
      });

      hero.setAttribute('data-state', key);
    }

    function updateMenuState(key){
      menuButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === key);
      });

      settingsBtn.classList.toggle('active', key === 'settings');
      homeBtn.classList.toggle('active', key === 'home');
    }

    function setState(key){
      activeKey = key;
      setSurface(key);
      renderState(key);
      updateMenuState(key);
    }

    /* Core behaviour:
       - Hovering a menu item changes the tile
       - That tile stays there
       - No mouseleave reset
       - Clicking does the same
    */
    menuButtons.forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener('mouseenter', () => setState(key));
      btn.addEventListener('focus', () => setState(key));
      btn.addEventListener('click', () => setState(key));
    });

    settingsBtn.addEventListener('mouseenter', () => setState('settings'));
    settingsBtn.addEventListener('focus', () => setState('settings'));
    settingsBtn.addEventListener('click', () => setState('settings'));

    homeBtn.addEventListener('mouseenter', () => setState('home'));
    homeBtn.addEventListener('focus', () => setState('home'));
    homeBtn.addEventListener('click', () => setState('home'));

    setState('home');
  </script>
</body>
</html>
