<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Menu Demo</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --muted:#8b8b8b;
      --glass-1:rgba(238,238,238,0.82);
      --glass-2:rgba(226,226,226,0.56);
      --glass-border:rgba(255,255,255,0.78);
      --pill:#FDE2CB;
      --hero-radius:28px;
      --menu-radius:28px;
      --hero-shadow:0 12px 30px rgba(0,0,0,0.04);
      --menu-shadow:
        0 14px 28px rgba(0,0,0,0.08),
        0 5px 14px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.92);
      --ease:cubic-bezier(.22,.7,.1,1);
    }

    *{box-sizing:border-box}

    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: Lato, Arial, sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      margin: 0;
    }

    .shell{
      width:100%;
      padding:clamp(12px, 1.8vw, 20px);
      display:flex;
      justify-content:center;
      background:#ffffff;
    }

    .frame{
      width:min(1120px,100%);
      min-height:100%;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .mobile-welcome{
      display:none;
    }

    /* HERO */
    .hero{
      position:relative;
      width:100%;
      min-height:clamp(320px, 38vw, 470px);
      border-radius:var(--hero-radius);
      overflow:hidden;
      background:#ffffff;
      border:1px solid rgba(242,242,242,1);
      box-shadow:var(--hero-shadow);
      isolation:isolate;
      cursor:pointer;
    }

    .hero-surface{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity 520ms var(--ease);
      background-size:180% 180%;
      animation:powderFlow 10s ease-in-out infinite;
      will-change:opacity, background-position;
    }

    .hero-surface.active{
      opacity:1;
    }

    .hero-home{
      background:#ffffff;
      animation:none;
      opacity:1;
    }

    .hero-learning{
      background:
        radial-gradient(circle at 17% 22%, rgba(255,255,255,0.72) 0%, rgba(255,255,255,0) 20%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0) 24%),
        radial-gradient(circle at 64% 78%, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 27%),
        linear-gradient(132deg, #fafafa 0%, #ececec 20%, #d8ccc4 42%, #f2e8e2 62%, #efefef 100%);
    }

    .hero-resources{
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.68) 0%, rgba(255,255,255,0) 20%),
        radial-gradient(circle at 84% 24%, rgba(225,236,245,0.46) 0%, rgba(225,236,245,0) 24%),
        radial-gradient(circle at 60% 76%, rgba(206,218,229,0.34) 0%, rgba(206,218,229,0) 28%),
        linear-gradient(132deg, #f8fbfd 0%, #dfe9f0 18%, #bfd0de 42%, #e8eff4 66%, #fbfdfe 100%);
    }

    .hero-compliance{
      background:
        radial-gradient(circle at 16% 22%, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0) 20%),
        radial-gradient(circle at 84% 18%, rgba(244,233,255,0.40) 0%, rgba(244,233,255,0) 24%),
        radial-gradient(circle at 64% 80%, rgba(213,185,255,0.34) 0%, rgba(213,185,255,0) 28%),
        linear-gradient(130deg, #fcfbff 0%, #ebdefe 18%, #cfb3ff 40%, #b984ff 56%, #e7dcff 72%, #ffffff 100%);
    }

    .hero-admin{
      background:
        radial-gradient(circle at 14% 20%, rgba(255,255,255,0.68) 0%, rgba(255,255,255,0) 18%),
        radial-gradient(circle at 86% 18%, rgba(255,227,202,0.42) 0%, rgba(255,227,202,0) 22%),
        radial-gradient(circle at 62% 80%, rgba(255,204,156,0.28) 0%, rgba(255,204,156,0) 26%),
        linear-gradient(135deg, #fffaf6 0%, #fde7d5 22%, #fdcfac 48%, #f4b37f 65%, #fde7d5 82%, #ffffff 100%);
    }

    .hero-gloss{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
      transition:opacity 400ms ease;
      background:
        linear-gradient(120deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.08) 16%,
          rgba(255,255,255,0.28) 30%,
          rgba(255,255,255,0.08) 44%,
          rgba(255,255,255,0) 58%);
      background-size:220% 220%;
      animation:surfaceSweep 6s linear infinite;
      mix-blend-mode:screen;
    }

    .hero.has-colour .hero-gloss{
      opacity:1;
    }

    .hero-content{
      position:relative;
      z-index:3;
      min-height:clamp(320px, 38vw, 470px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(24px, 3.5vw, 44px);
      text-align:center;
    }

    .text-stage{
      position:relative;
      min-height:110px;
      display:flex;
      align-items:center;
      justify-content:center;
      width:min(860px, 100%);
    }

    .text-layer{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      opacity:0;
      transform:translateX(0);
      transition:
        opacity 380ms var(--ease),
        transform 380ms var(--ease);
      pointer-events:none;
    }

    .text-layer.active{
      opacity:1;
      transform:translateX(0);
    }

    .text-layer.exit-left{
      opacity:0;
      transform:translateX(-26px);
    }

    .text-layer.exit-right{
      opacity:0;
      transform:translateX(26px);
    }

    .text-layer.enter-left{
      opacity:0;
      transform:translateX(-26px);
    }

    .text-layer.enter-right{
      opacity:0;
      transform:translateX(26px);
    }

    .hello-big{
      margin:0;
      font-size:clamp(40px, 6.6vw, 84px);
      line-height:0.95;
      letter-spacing:-0.06em;
      font-weight:500;
      color:#121212;
    }

    .hello-small{
      margin:0;
      font-size:clamp(12px, 1.2vw, 17px);
      line-height:1.45;
      letter-spacing:0.01em;
      color:#868686;
      font-weight:400;
    }

    .state-title{
      margin:0;
      font-size:clamp(28px, 4.4vw, 60px);
      line-height:0.98;
      letter-spacing:-0.055em;
      font-weight:800;
      color:#111111;
    }

    /* MENU */
    .menu-zone{
      width:100%;
      margin-top:-4px;
    }

    .menu-wrap{
      position:relative;
      width:100%;
      min-height:108px;
      border-radius:var(--menu-radius);
      overflow:hidden;
      border:1px solid var(--glass-border);
      background:
        linear-gradient(135deg, var(--glass-1) 0%, var(--glass-2) 50%, rgba(243,243,243,0.74) 100%);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      box-shadow:var(--menu-shadow);
      isolation:isolate;
    }

    .menu-wrap::before{
      content:"";
      position:absolute;
      inset:-35% -15%;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.10) 16%,
          rgba(255,255,255,0.30) 23%,
          rgba(255,255,255,0.06) 32%,
          rgba(255,255,255,0) 42%);
      transform:translateX(-56%);
      animation:glassSweep 10s ease-in-out infinite;
      pointer-events:none;
      z-index:0;
    }

    .menu{
      position:relative;
      z-index:2;
      width:100%;
      min-height:108px;
      display:grid;
      grid-template-columns:60px minmax(0,1fr) auto;
      align-items:center;
      gap:12px;
      padding:14px;
    }

    .icon-btn{
      width:56px;
      height:56px;
      border-radius:999px;
      appearance:none;
      border:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:
        background 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease,
        opacity 180ms ease;
      color:#111111;
      font-size:18px;
      flex:0 0 auto;
    }

    .icon-btn:hover{
      transform:translateY(-1px);
    }

    .home-btn{
      background:rgba(255,255,255,0.96);
      border:1px solid rgba(255,255,255,0.96);
      box-shadow:
        0 8px 18px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,1);
    }

    .home-btn.active{
      background:#ffffff;
      box-shadow:
        0 10px 22px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,1);
    }

    .menu-items{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      flex-wrap:nowrap;
      min-width:0;
      overflow:hidden;
    }

    .menu-item,
    .admin-btn{
      position:relative;
      appearance:none;
      border:0;
      color:#151515;
      padding:14px 22px;
      border-radius:999px;
      font-family:inherit;
      font-size:clamp(15px, 1.2vw, 19px);
      line-height:1;
      letter-spacing:-0.02em;
      font-weight:600;
      white-space:nowrap;
      cursor:pointer;
      transition:
        background 160ms ease,
        box-shadow 160ms ease,
        color 160ms ease,
        transform 160ms ease;
      overflow:hidden;
      isolation:isolate;
    }

    .menu-item{
      background:transparent;
    }

    .menu-item span,
    .admin-btn span{
      position:relative;
      z-index:2;
    }

    .menu-item::before,
    .admin-btn::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:0;
      border-radius:inherit;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.10) 28%,
          rgba(255,255,255,0.22) 42%,
          rgba(255,255,255,0.06) 56%,
          rgba(255,255,255,0) 72%);
      background-size:200% 200%;
      pointer-events:none;
      z-index:1;
    }

    .menu-item:hover,
    .menu-item.active{
      background:var(--pill);
      color:#111111;
      box-shadow:0 7px 16px rgba(0,0,0,0.038);
    }

    .menu-item:hover::before,
    .menu-item.active::before,
    .admin-btn:hover::before,
    .admin-btn.active::before{
      opacity:1;
      animation:subtlePillMove 3.4s linear infinite;
    }

    .menu-item.active,
    .admin-btn.active{
      font-weight:700;
    }

    .menu-item:hover,
    .admin-btn:hover{
      transform:translateY(-1px);
    }

    .admin-btn{
      background:linear-gradient(135deg, #fde9d8 0%, #fdcfac 52%, #f4b37f 100%);
      box-shadow:
        0 10px 22px rgba(209,132,72,0.18),
        inset 0 1px 0 rgba(255,255,255,0.82);
      border:1px solid rgba(255,255,255,0.7);
      min-width:142px;
      justify-self:end;
    }

    .admin-btn:hover,
    .admin-btn.active{
      background:linear-gradient(135deg, #fce1cc 0%, #fdc79d 48%, #f0a96f 100%);
      color:#111111;
      box-shadow:
        0 12px 26px rgba(209,132,72,0.22),
        inset 0 1px 0 rgba(255,255,255,0.82);
    }

    /* MOBILE MENU */
    .mobile-menu{
      display:none;
      position:relative;
      z-index:2;
    }

    .mobile-menu-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:6px 4px;
    }

    .mobile-menu-heading{
      display:flex;
      flex-direction:column;
      gap:3px;
      min-width:0;
    }

    .mobile-menu-label{
      margin:0;
      font-size:18px;
      line-height:1.1;
      font-weight:700;
      letter-spacing:-0.03em;
      color:#111111;
    }

    .mobile-menu-caption{
      margin:0;
      font-size:12px;
      line-height:1.3;
      color:#7a7a7a;
      letter-spacing:0.01em;
    }

    .burger-btn{
      width:50px;
      height:50px;
      flex:0 0 auto;
      background:rgba(255,255,255,0.78);
      border:1px solid rgba(255,255,255,0.92);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.045),
        inset 0 1px 0 rgba(255,255,255,1);
      font-size:17px;
    }

    .mobile-menu-panel{
      max-height:0;
      opacity:0;
      overflow:hidden;
      transition:
        max-height 280ms var(--ease),
        opacity 180ms ease,
        padding-top 180ms ease;
      padding-top:0;
    }

    .mobile-menu.open .mobile-menu-panel{
      max-height:460px;
      opacity:1;
      padding-top:8px;
    }

    .mobile-menu-list{
      display:grid;
      gap:10px;
      padding:0 4px 4px 4px;
    }

    .mobile-link{
      width:100%;
      appearance:none;
      border:1px solid rgba(255,255,255,0.78);
      background:rgba(255,255,255,0.68);
      color:#111111;
      border-radius:18px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-family:inherit;
      font-size:15px;
      line-height:1;
      font-weight:600;
      cursor:pointer;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.96);
      transition:
        transform 160ms ease,
        background 160ms ease,
        box-shadow 160ms ease;
    }

    .mobile-link:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,0.85);
    }

    .mobile-link i{
      font-size:13px;
      color:#7b7b7b;
    }

    .mobile-link.admin-mobile{
      background:linear-gradient(135deg, rgba(253,233,216,0.96) 0%, rgba(253,207,172,0.92) 52%, rgba(244,179,127,0.92) 100%);
      box-shadow:
        0 10px 18px rgba(209,132,72,0.15),
        inset 0 1px 0 rgba(255,255,255,0.88);
    }

    @keyframes powderFlow{
      0%{background-position:0% 50%}
      25%{background-position:28% 35%}
      50%{background-position:100% 50%}
      75%{background-position:72% 70%}
      100%{background-position:0% 50%}
    }

    @keyframes surfaceSweep{
      0%{background-position:0% 50%}
      100%{background-position:220% 50%}
    }

    @keyframes glassSweep{
      0%{transform:translateX(-56%)}
      50%{transform:translateX(18%)}
      100%{transform:translateX(-56%)}
    }

    @keyframes subtlePillMove{
      0%{background-position:0% 50%}
      100%{background-position:200% 50%}
    }

    @media (max-width: 1180px){
      .frame{
        width:min(1000px,100%);
      }

      .hero{
        min-height:clamp(300px, 36vw, 430px);
      }

      .hero-content{
        min-height:clamp(300px, 36vw, 430px);
      }

      .menu{
        grid-template-columns:56px minmax(0,1fr) auto;
        min-height:100px;
        padding:12px;
      }

      .menu-items{
        gap:2px;
      }

      .menu-item,
      .admin-btn{
        padding:12px 16px;
        font-size:15px;
      }

      .admin-btn{
        min-width:128px;
      }
    }

    @media (max-width: 980px){
      .shell{
        padding:14px 12px 24px 12px;
      }

      .frame{
        gap:14px;
      }

      .hero{
        min-height:320px;
      }

      .hero-content{
        min-height:320px;
        padding:24px 20px;
      }

      .text-stage{
        min-height:96px;
      }

      .menu{
        grid-template-columns:52px minmax(0,1fr) auto;
        padding:10px;
        gap:8px;
      }

      .icon-btn{
        width:50px;
        height:50px;
        font-size:17px;
      }

      .menu-item,
      .admin-btn{
        padding:12px 14px;
        font-size:14px;
      }

      .admin-btn{
        min-width:118px;
      }
    }

    @media (max-width: 760px){
      .shell{
        padding:12px 10px 18px 10px;
      }

      .frame{
        min-height:auto;
        gap:12px;
      }

      .mobile-welcome{
        display:block;
        padding:2px 4px 0 4px;
      }

      .mobile-welcome h1{
        margin:0;
        font-size:30px;
        line-height:0.98;
        letter-spacing:-0.05em;
        font-weight:800;
        color:#111111;
      }

      .mobile-welcome p{
        margin:8px 0 0 0;
        font-size:13px;
        line-height:1.35;
        color:#808080;
        letter-spacing:0.01em;
      }

      .hero{
        display:none;
      }

      .menu-zone{
        margin-top:0;
      }

      .menu-wrap{
        min-height:auto;
        border-radius:24px;
        padding:8px;
        box-shadow:
          0 12px 26px rgba(0,0,0,0.08),
          0 4px 12px rgba(0,0,0,0.04),
          inset 0 1px 0 rgba(255,255,255,0.9);
      }

      .menu-wrap::before{
        inset:-55% -35%;
        opacity:0.8;
      }

      .menu.desktop-menu{
        display:none;
      }

      .mobile-menu{
        display:block;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="frame">

      <div class="mobile-welcome">
        <h1>Welcome</h1>
        <p>Choose a destination from the menu below</p>
      </div>

      <section class="hero" id="hero" data-state="home" aria-live="polite">
        <div class="hero-surface hero-home active" data-surface="home"></div>
        <div class="hero-surface hero-learning" data-surface="learning"></div>
        <div class="hero-surface hero-resources" data-surface="resources"></div>
        <div class="hero-surface hero-compliance" data-surface="compliance"></div>
        <div class="hero-surface hero-admin" data-surface="admin"></div>
        <div class="hero-gloss"></div>

        <div class="hero-content">
          <div class="text-stage" id="textStage">
            <div class="text-layer active" id="textLayerA"></div>
            <div class="text-layer" id="textLayerB"></div>
          </div>
        </div>
      </section>

      <div class="menu-zone">
        <nav class="menu-wrap" aria-label="Main menu">

          <div class="menu desktop-menu">
            <button class="icon-btn home-btn active" id="homeBtn" type="button" aria-label="Home">
              <i class="fa-solid fa-house"></i>
            </button>

            <div class="menu-items" id="menuItems">
              <button class="menu-item" type="button" data-key="learning" data-index="0"><span>My Learning</span></button>
              <button class="menu-item" type="button" data-key="resources" data-index="1"><span>My Resources</span></button>
              <button class="menu-item" type="button" data-key="compliance" data-index="2"><span>My Compliance</span></button>
            </div>

            <button class="admin-btn" id="adminBtn" type="button" aria-label="My Admin">
              <span>My Admin</span>
            </button>
          </div>

          <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu-bar">
              <div class="mobile-menu-heading">
                <p class="mobile-menu-label">Menu</p>
                <p class="mobile-menu-caption">Open shortcuts and links</p>
              </div>

              <button
                class="icon-btn burger-btn"
                id="burgerBtn"
                type="button"
                aria-label="Open menu"
                aria-expanded="false"
                aria-controls="mobileMenuPanel">
                <i class="fa-solid fa-bars"></i>
              </button>
            </div>

            <div class="mobile-menu-panel" id="mobileMenuPanel">
              <div class="mobile-menu-list">
                <button class="mobile-link" type="button" data-key="learning">
                  <span>My Learning</span>
                  <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </button>

                <button class="mobile-link" type="button" data-key="resources">
                  <span>My Resources</span>
                  <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </button>

                <button class="mobile-link" type="button" data-key="compliance">
                  <span>My Compliance</span>
                  <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </button>

                <button class="mobile-link admin-mobile" type="button" data-key="admin">
                  <span>My Admin</span>
                  <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </button>
              </div>
            </div>
          </div>

        </nav>
      </div>

    </div>
  </div>

  <script>
    const hero = document.getElementById('hero');
    const menuButtons = Array.from(document.querySelectorAll('.menu-item'));
    const homeBtn = document.getElementById('homeBtn');
    const adminBtn = document.getElementById('adminBtn');
    const surfaces = Array.from(document.querySelectorAll('.hero-surface'));

    const layerA = document.getElementById('textLayerA');
    const layerB = document.getElementById('textLayerB');

    const mobileMenu = document.getElementById('mobileMenu');
    const burgerBtn = document.getElementById('burgerBtn');
    const burgerIcon = burgerBtn.querySelector('i');
    const mobileLinks = Array.from(document.querySelectorAll('.mobile-link'));

    const states = {
      home: {
        index: -1,
        html: `
          <h1 class="hello-big">Hello</h1>
          <p class="hello-small">Hover over an item or click to open it</p>
        `
      },
      learning: {
        index: 0,
        html: `<h1 class="state-title">My Learning</h1>`
      },
      resources: {
        index: 1,
        html: `<h1 class="state-title">My Resources</h1>`
      },
      compliance: {
        index: 2,
        html: `<h1 class="state-title">My Compliance</h1>`
      },
      admin: {
        index: 3,
        html: `<h1 class="state-title">My Admin</h1>`
      }
    };

    const links = {
      home: null,
      learning: "https://khepri.agca.app/my-activities",
      resources: "https://khepri.agca.app/resource-hub",
      compliance: "https://khepri.agca.app/compliance",
      admin: "https://khepri.agca.app/profile"
    };

    function openInNewTab(url){
      if (!url) return;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    let currentKey = 'home';
    let visibleLayer = layerA;
    let hiddenLayer = layerB;
    let currentIndex = -1;

    function swapLayers(){
      const temp = visibleLayer;
      visibleLayer = hiddenLayer;
      hiddenLayer = temp;
    }

    function setSurface(key){
      surfaces.forEach(surface => {
        surface.classList.toggle('active', surface.dataset.surface === key);
      });

      if(key === 'home'){
        hero.classList.remove('has-colour');
      } else {
        hero.classList.add('has-colour');
      }

      hero.setAttribute('data-state', key);
    }

    function transitionText(key, direction){
      const content = states[key].html;

      hiddenLayer.innerHTML = content;
      hiddenLayer.className = 'text-layer';

      if(direction === 'right'){
        visibleLayer.classList.remove('active');
        visibleLayer.classList.add('exit-left');
        hiddenLayer.classList.add('enter-right');
      } else if(direction === 'left'){
        visibleLayer.classList.remove('active');
        visibleLayer.classList.add('exit-right');
        hiddenLayer.classList.add('enter-left');
      } else {
        visibleLayer.classList.remove('active');
      }

      requestAnimationFrame(() => {
        hiddenLayer.classList.add('active');
        hiddenLayer.classList.remove('enter-left', 'enter-right');
      });

      setTimeout(() => {
        visibleLayer.className = 'text-layer';
        swapLayers();
      }, 390);
    }

    function getDirection(fromIndex, toIndex){
      if(toIndex > fromIndex) return 'right';
      if(toIndex < fromIndex) return 'left';
      return 'none';
    }

    function clearButtonStates(){
      menuButtons.forEach(btn => btn.classList.remove('active'));
      homeBtn.classList.remove('active');
      adminBtn.classList.remove('active');
    }

    function setHero(key){
      const nextIndex = states[key].index;
      const direction = getDirection(currentIndex, nextIndex);
      setSurface(key);
      transitionText(key, direction);
      currentIndex = nextIndex;
    }

    function setVisibleState(key){
      currentKey = key;
      clearButtonStates();

      if(key === 'home'){
        homeBtn.classList.add('active');
        setHero('home');
        return;
      }

      if(key === 'admin'){
        adminBtn.classList.add('active');
        setHero('admin');
        return;
      }

      const btn = menuButtons.find(b => b.dataset.key === key);
      if(btn) btn.classList.add('active');

      setHero(key);
    }

    function closeMobileMenu(){
      mobileMenu.classList.remove('open');
      burgerBtn.setAttribute('aria-expanded', 'false');
      burgerBtn.setAttribute('aria-label', 'Open menu');
      burgerIcon.className = 'fa-solid fa-bars';
    }

    function toggleMobileMenu(){
      const isOpen = mobileMenu.classList.toggle('open');
      burgerBtn.setAttribute('aria-expanded', String(isOpen));
      burgerBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
      burgerIcon.className = isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
    }

    menuButtons.forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener('mouseenter', () => setVisibleState(key));
      btn.addEventListener('focus', () => setVisibleState(key));
      btn.addEventListener('click', () => {
        setVisibleState(key);
        openInNewTab(links[key]);
      });
    });

    adminBtn.addEventListener('mouseenter', () => setVisibleState('admin'));
    adminBtn.addEventListener('focus', () => setVisibleState('admin'));
    adminBtn.addEventListener('click', () => {
      setVisibleState('admin');
      openInNewTab(links.admin);
    });

    homeBtn.addEventListener('mouseenter', () => setHero('home'));
    homeBtn.addEventListener('focus', () => setHero('home'));
    homeBtn.addEventListener('mouseleave', () => {
      if(currentKey !== 'home'){
        setHero(currentKey);
      }
    });
    homeBtn.addEventListener('blur', () => {
      if(currentKey !== 'home'){
        setHero(currentKey);
      }
    });
    homeBtn.addEventListener('click', () => {
      setVisibleState('home');
      openInNewTab(links.home);
    });

    burgerBtn.addEventListener('click', toggleMobileMenu);

    mobileLinks.forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        closeMobileMenu();
        openInNewTab(links[key]);
      });
    });

    document.addEventListener('click', (e) => {
      if (window.innerWidth > 760) return;
      if (!mobileMenu.contains(e.target)) {
        closeMobileMenu();
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 760) {
        closeMobileMenu();
      }
    });

    hero.addEventListener('click', () => {
      const current = currentKey;
      if(current === 'home') return;

      const activeSurface = document.querySelector(`.hero-surface[data-surface="${current}"]`);
      if(!activeSurface) return;

      activeSurface.style.animationDuration =
        activeSurface.style.animationDuration === '6.6s' ? '10s' : '6.6s';
    });

    layerA.innerHTML = states.home.html;
    layerA.className = 'text-layer active';
    layerB.className = 'text-layer';
    setSurface('home');
    homeBtn.classList.add('active');
  </script>
</body>
</html>
